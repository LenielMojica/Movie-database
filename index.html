<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-zinc-950 px-8 py-4 flex items-center justify-between border-b border-zinc-800">
        <h1 class="text-red-600 font-bold text-2xl tracking-widest">FIND A MOVIE, SERIES, OR WHATEVER YOU WANT</h1>

        <div class="flex items-center gap-2">
            <!-- Keep the clear button inside the input wrapper. -->
            <div class="relative">
                <input
                    id="search-input"
                    type="text"
                    placeholder="Search movies, series..."
                    class="bg-zinc-800 text-white px-4 py-2 rounded w-72 focus:outline-none focus:ring-1 focus:ring-red-600 placeholder-zinc-500 pr-8"
                />
                <button id="clear-button" class="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-black hidden">x</button>
            </div>

            <button
                id="search-button"
                class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded transition-colors"
            >
                Search
            </button>
        </div>
    </nav>

    <!-- Filters -->
    <div class="px-8 py-4 flex gap-3">
        <button data-type="all" class="filter bg-red-600 text-white px-4 py-1 rounded-full text-sm">All</button>
        <button data-type="all" id="clear-favorites" class="hidden filter bg-red-600 text-white px-4 py-1 rounded-full text-sm">Clear Favorites</button>
        <button data-type="all" id="view-favorites" class="filter bg-red-600 text-white px-4 py-1 rounded-full text-sm">View Favorites</button>
    </div>

    <!-- Results grid -->
    <main class="px-8 py-4 results-container">
        <p id="results-message" class="text-zinc-500 font-mono mb-4"></p>
        <div id="movies-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- Cards are rendered here -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
